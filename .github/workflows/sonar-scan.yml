name: CI - Tests & Sonar Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-sonar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'false'

      - name: Init submodules if configured
        run: |
          if [ -f .gitmodules ]; then
            echo ".gitmodules detected — attempting to init submodules"
            git submodule sync --recursive
            git submodule update --init --force --recursive || echo "Submodule update failed; continuing without submodules"
          else
            echo ".gitmodules not present; skipping submodule init"
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          if [ -f sonar-test-project/requirements.txt ]; then
            python -m pip install -r sonar-test-project/requirements.txt coverage pytest-cov
          else
            echo "sonar-test-project/requirements.txt not found — installing minimal test deps"
            python -m pip install coverage pytest-cov
          fi

      - name: Run tests and produce coverage.xml
        working-directory: sonar-test-project
        run: |
          coverage run -m pytest
          coverage xml -o coverage.xml
          ls -la

      - name: Run SonarScanner (Docker)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          # Validate inputs
          if [ -z "${SONAR_HOST_URL}" ] || [ -z "${SONAR_TOKEN}" ]; then
            echo "ERROR: SONAR_HOST_URL and SONAR_TOKEN must be provided as repository secrets"
            echo "Set them in Settings → Secrets and try again. Example SONAR_HOST_URL: https://sonarcloud.io or https://your-sonarqube.example.com"
            exit 1
          fi

          # Quick connectivity check to the Sonar server
          echo "Checking Sonar host ${SONAR_HOST_URL}..."
          if ! curl --fail --silent --show-error --max-time 10 "${SONAR_HOST_URL}/api/server/version" ; then
            echo "ERROR: Unable to reach Sonar host at ${SONAR_HOST_URL}."
            echo "Make sure the URL is correct and the server is reachable from the Actions runner."
            exit 1
          fi

          # Run SonarScanner in Docker, explicitly pass the token
          docker run --rm \
            -v "${{ github.workspace }}/sonar-test-project:/usr/src" \
            -w /usr/src \
            -e SONAR_TOKEN=${SONAR_TOKEN} \
            sonarsource/sonar-scanner-cli bash -lc \
              "sonar-scanner -Dsonar.host.url=${SONAR_HOST_URL} -Dsonar.login=${SONAR_TOKEN} -Dsonar.coverageReportPaths=coverage.xml"
