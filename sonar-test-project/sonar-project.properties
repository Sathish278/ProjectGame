sonar.projectKey=PROD-Sonar
sonar.projectName=PROD-Sonar
sonar.sources=.
# restrict analysis to Python files only
sonar.inclusions=**/*.py
# test files for coverage (list directories only; no wildcards)
sonar.tests=tests
# exclude common non-Python assets
sonar.exclusions=**/*.xml,**/*.json,**/*.md,**/static/**,**/templates/**
sonar.language=py
sonar.sourceEncoding=UTF-8
# coverage report (Cobertura XML) produced by coverage xml
sonar.coverageReportPaths=coverage.xml
# also include Python-specific property for older scanners/plugins
sonar.python.coverage.reportPaths=coverage.xml
